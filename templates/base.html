{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Support your local{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen flex flex-col bg-stone-100 text-neutral-900">

    <header class="h-32 xl:h-24 flex items-center justify-between px-6 border-b border-neutral-200">
        <div class="flex items-center gap-2 w-[25%]">
            {# сюда позже — картинка-логотип #}
            <span class="font-semibold tracking-tight text-lg">Support your local</span>
            <p class="text-sm text-neutral-500">(лого банды или какая-нибудь фраза)</p>
        </div>
        {# сюда позже — ссылка на магазин мерча #}
        <nav>
            <!-- <a href="#" class="text-sm text-neutral-600 hover:text-neutral-900">Магазин</a> -->
        </nav>
    </header>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-neutral-200 py-8 px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <a href="{{ site_settings.tg_url }}" aria-label="Telegram" class="group block w-5 h-5">
                <span
                    style="mask-image:url('{% static "img/icons/tg.svg" %}'); -webkit-mask-image:url('{% static "img/icons/tg.svg" %}');"
                    class="block w-full h-full bg-neutral-500 group-hover:bg-neutral-900 transition-colors
                    [mask-repeat:no-repeat] [mask-size:contain] [mask-position:center]
                    [-webkit-mask-repeat:no-repeat] [-webkit-mask-size:contain] [-webkit-mask-position:center]">
                </span>
            </a>
            <a href="{{ site_settings.vk_url }}" aria-label="VK" class="group block w-5 h-5">
                <span
                    style="mask-image:url('{% static "img/icons/vk.svg" %}'); -webkit-mask-image:url('{% static "img/icons/vk.svg" %}');"
                    class="block w-full h-full bg-neutral-500 group-hover:bg-neutral-900 transition-colors
                    [mask-repeat:no-repeat] [mask-size:contain] [mask-position:center]
                    [-webkit-mask-repeat:no-repeat] [-webkit-mask-size:contain] [-webkit-mask-position:center]">
                </span>
            </a>
            <a href="mailto:{{ site_settings.email }}" class="text-base xl:text-sm text-neutral-500 hover:text-neutral-900">
                run@eseninbeg.ru
            </a>
        </div>
        <div class="flex items-center gap-2">
            <p class="text-base xl:text-sm text-neutral-500">{% now "Y" %} | built with ♡</p>
            <img src="{% static 'img/icons/goose.svg' %}" alt="" class="w-20 h-20 opacity-50">
        </div>
    </footer>

</body>
</html>
